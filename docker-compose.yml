version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: gpa_db
    environment:
      POSTGRES_USER: gpa_user
      POSTGRES_PASSWORD: gpa_password
      POSTGRES_DB: gpa_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpa_user -d gpa_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gpa_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://gpa_user:gpa_password@db:5432/gpa_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gpa_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
